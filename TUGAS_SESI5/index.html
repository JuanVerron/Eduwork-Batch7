<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas Sesi 5 | E-commerce Gadget</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">Tech<span>Store</span></a>
            <span style="color: var(--muted); font-size: 0.85rem;">
                <i class="bi bi-lightning-charge-fill" style="color: var(--accent);"></i>
                Gadget Terbaik, Harga Terjangkau
            </span>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>Temukan <span>Gadget</span> Impianmu</h1>
            <p>Koleksi lengkap laptop, smartphone, audio, dan aksesoris pilihan.</p>
        </div>
    </section>


    <main class="container pb-5">


        <div class="filter-panel">


            <span class="filter-label"><i class="bi bi-tag me-1"></i>Kategori</span>
            <div id="filterKategori"></div>

            <hr class="filter-divider" />


            <span class="filter-label"><i class="bi bi-cash-stack me-1"></i>Rentang Harga</span>
            <div id="filterHarga"></div>

            <hr class="filter-divider" />


            <div class="d-flex align-items-center gap-3 flex-wrap">
                <span class="filter-label mb-0"><i class="bi bi-sort-down me-1"></i>Urutkan</span>
                <select class="sort-select" id="sortSelect">
                    <option value="default">Default</option>
                    <option value="harga-tertinggi">Harga: Tertinggi ke Terendah</option>
                    <option value="harga-terendah">Harga: Terendah ke Tertinggi</option>
                    <option value="terlaris">Terlaris</option>
                </select>
            </div>

        </div>
        <p class="product-count" id="productCount"></p>
        <div class="row g-4" id="productGrid"></div>

    </main>

    <footer>
        <div class="container">
            © 2025 TechStore — Tugas sesi 5 oleh Juan Verron.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
